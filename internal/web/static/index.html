<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hydra Relay Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14; --bg2:#0d111a; --surface:#141a26; --surface2:#1b2331;
    --line:#232c3d; --line2:#2d384c;
    --text:#E6EAF2; --muted:#8a93a6; --faint:#5a6478;
    --on:#37E0A6;            /* healthy / on air */
    --tally:#FF3B47;         /* live tally light */
    --brb:#F5A623;           /* be right back */
    --accent:#5B8CFF;
    --display:'Space Grotesk',system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, #11203a55, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #1a2a1f44, transparent 55%),
      var(--bg);
    color:var(--text); font-family:var(--body); font-size:14px; line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:28px 22px 60px}
  a{color:var(--accent)}

  /* ---- top bar ---- */
  header{display:flex;align-items:center;gap:16px;margin-bottom:26px}
  .logo{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
  .logo .mark{width:22px;height:22px;display:inline-block}
  .spacer{flex:1}
  .tally{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;
    text-transform:uppercase;letter-spacing:.14em;padding:7px 13px;border-radius:999px;
    border:1px solid var(--line2);background:var(--surface)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--faint)}
  .tally.live .dot{background:var(--tally);box-shadow:0 0 0 0 var(--tally);animation:pulse 1.4s infinite}
  .tally.live{color:#ffd5d8;border-color:#5a2630}
  .tally.brb .dot{background:var(--brb)}
  .tally.brb{color:#ffe6bf;border-color:#5a4520}
  .tally.idle{color:var(--muted)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 #ff3b4799}70%{box-shadow:0 0 0 8px #ff3b4700}100%{box-shadow:0 0 0 0 #ff3b4700}}

  .btn{font-family:var(--mono);font-size:12px;letter-spacing:.05em;cursor:pointer;
    border:1px solid var(--line2);background:var(--surface);color:var(--text);
    padding:8px 14px;border-radius:8px;transition:.15s}
  .btn:hover{border-color:var(--faint);background:var(--surface2)}
  .btn.danger:hover{border-color:#5a2630;color:#ffd5d8}

  /* ---- signal flow (signature element) ---- */
  .flow{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--line);
    border-radius:16px;padding:26px 22px;margin-bottom:22px;position:relative;overflow:hidden}
  .flow .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-bottom:18px}
  .chain{display:flex;align-items:stretch;gap:0}
  .node{background:var(--surface2);border:1px solid var(--line2);border-radius:12px;padding:14px 16px;min-width:120px}
  .node .k{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint)}
  .node .v{font-family:var(--display);font-weight:600;font-size:16px;margin-top:3px}
  .node.core{border-color:var(--line2);position:relative}
  .node.core.on{border-color:var(--on);box-shadow:0 0 0 1px var(--on) inset, 0 0 26px -8px var(--on)}
  .node.core.brb{border-color:var(--brb);box-shadow:0 0 0 1px var(--brb) inset, 0 0 26px -8px var(--brb)}
  .edge{flex:1;min-width:34px;align-self:center;height:2px;background:var(--line2);position:relative}
  .edge.on{background:linear-gradient(90deg,var(--on),var(--on))}
  .edge.on::after{content:"";position:absolute;top:-2px;left:0;width:8px;height:6px;border-radius:3px;background:var(--on);
    animation:travel 1.3s linear infinite}
  .edge.brb.on{background:var(--brb)} .edge.brb.on::after{background:var(--brb)}
  @keyframes travel{from{left:-6px;opacity:0}10%{opacity:1}90%{opacity:1}to{left:100%;opacity:0}}
  .heads{display:flex;flex-direction:column;gap:8px;justify-content:center;min-width:150px}
  .head{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;
    border:1px solid var(--line2);border-radius:8px;padding:7px 10px;background:var(--surface2);color:var(--muted)}
  .head .hd{width:7px;height:7px;border-radius:50%;background:var(--faint);flex:none}
  .head.on{color:var(--text);border-color:#26402f} .head.on .hd{background:var(--on)}
  .head.brb.on .hd{background:var(--brb)}

  /* ---- metrics strip ---- */
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
  .metric{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
  .metric .k{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint)}
  .metric .v{font-family:var(--mono);font-weight:600;font-size:26px;margin-top:6px;font-variant-numeric:tabular-nums}
  .metric .u{font-size:13px;color:var(--muted);font-weight:400}
  .metric.warn .v{color:var(--brb)}

  /* ---- panels ---- */
  .grid{display:grid;grid-template-columns:1fr;gap:18px}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .panel h2{font-family:var(--display);font-weight:600;font-size:15px;margin:0;padding:15px 18px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px}
  .panel h2 .hint{font-family:var(--mono);font-size:11px;color:var(--faint);font-weight:400;letter-spacing:.05em}
  .panel .body{padding:6px 6px 10px}

  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:11px 14px;font-size:13px}
  th{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);font-weight:500}
  tbody tr{border-top:1px solid var(--line)}
  td .name{font-family:var(--display);font-weight:600}
  td .sub{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .pill{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    padding:3px 8px;border-radius:999px;border:1px solid var(--line2);color:var(--muted)}
  .pill.on{color:var(--on);border-color:#26402f}
  .pill.off{color:var(--faint)}
  .pill.copy{color:var(--accent);border-color:#26345a}
  .toggle{cursor:pointer;font-family:var(--mono);font-size:11px;border:1px solid var(--line2);
    background:var(--bg2);color:var(--muted);padding:5px 10px;border-radius:7px}
  .toggle:hover{border-color:var(--faint);color:var(--text)}

  .console{font-family:var(--mono);font-size:12px;line-height:1.6;color:#9fb0c7;
    background:var(--bg2);margin:0;padding:14px 18px;max-height:240px;overflow:auto;white-space:pre-wrap}
  .console:empty::before{content:"no active stream. ffmpeg output appears here while live.";color:var(--faint)}

  .ingest{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:8px}
  .ingest code{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:3px 7px;color:var(--text)}
  .foot{margin-top:30px;font-family:var(--mono);font-size:11px;color:var(--faint);text-align:center;letter-spacing:.05em}
  .note{font-family:var(--mono);font-size:11px;color:var(--brb);padding:0 18px 12px}
  @media(max-width:720px){.metrics{grid-template-columns:repeat(2,1fr)}.chain{flex-direction:column;gap:12px}.edge{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <svg class="mark" viewBox="0 0 24 24" fill="none"><path d="M12 2c0 4-5 5-5 9a5 5 0 0 0 10 0c0-4-5-5-5-9z" stroke="#37E0A6" stroke-width="1.6"/><circle cx="12" cy="13" r="2" fill="#37E0A6"/></svg>
      Hydra
    </div>
    <div class="spacer"></div>
    <div id="tally" class="tally idle"><span class="dot"></span><span id="tallyText">offline</span></div>
    <button id="stopBtn" class="btn danger">Stop session</button>
  </header>

  <!-- signature: live signal flow -->
  <section class="flow">
    <div class="eyebrow">Signal path</div>
    <div class="chain">
      <div class="node"><div class="k">Source</div><div class="v" id="srcLabel">OBS · idle</div></div>
      <div class="edge" id="edgeIn"></div>
      <div class="node core" id="core"><div class="k">Relay core</div><div class="v">Hydra · transcode</div></div>
      <div class="edge" id="edgeOut"></div>
      <div class="heads" id="heads"></div>
    </div>
    <div class="ingest" id="ingestLine"></div>
  </section>

  <!-- metrics -->
  <div class="metrics">
    <div class="metric"><div class="k">Encode FPS</div><div class="v" id="mFps">·</div></div>
    <div class="metric" id="mSpeedBox"><div class="k">Speed</div><div class="v" id="mSpeed">·<span class="u">×</span></div></div>
    <div class="metric" id="mDropBox"><div class="k">Dropped</div><div class="v" id="mDrop">·</div></div>
    <div class="metric"><div class="k">Uptime</div><div class="v" id="mUp">·</div></div>
  </div>

  <div class="grid">
    <section class="panel">
      <h2>Targets <span class="hint">enable/disable applies on next stream</span></h2>
      <div id="toggleNote" class="note" style="display:none"></div>
      <div class="body">
        <table>
          <thead><tr><th>Destination</th><th>Mode</th><th>Profile</th><th>State</th><th></th></tr></thead>
          <tbody id="targetRows"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <h2>Encoder console <span class="hint">ffmpeg · last lines</span></h2>
      <pre id="console" class="console"></pre>
    </section>
  </div>

  <div class="foot">Hydra · <span id="lastEvent">·</span> · Made by Elchi</div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token') || '';
const q = token ? ('?token=' + encodeURIComponent(token)) : '';
const authHeaders = token ? {'Authorization':'Bearer '+token} : {};

let cfg = {targets:[]};

function fmtUptime(s){
  if(!s) return '·';
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return (h?h+'h ':'')+(m||h?String(m).padStart(2,'0')+'m ':'')+String(sec).padStart(2,'0')+'s';
}

async function loadConfig(){
  try{
    const r = await fetch('/api/config'+q,{headers:authHeaders});
    cfg = await r.json();
    const host = location.hostname || '<host>';
    const port = (cfg.rtmp_listen||':1935').split(':').pop();
    document.getElementById('ingestLine').innerHTML =
      'Point OBS at &nbsp;<code>rtmp://'+host+':'+port+'/'+cfg.ingest_app+'/<stream_key></code>';
    renderTargets(null);
  }catch(e){ console.error(e); }
}

function renderTargets(snap){
  const rows = document.getElementById('targetRows');
  const heads = document.getElementById('heads');
  rows.innerHTML=''; heads.innerHTML='';
  const phase = snap ? snap.phase : 'idle';
  const liveish = phase==='live'||phase==='brb';
  const brb = phase==='brb';

  cfg.targets.forEach(t=>{
    const active = liveish && t.enabled;
    // table row
    const tr=document.createElement('tr');
    const prof = t.mode==='copy' ? 'passthrough'
      : ((t.resolution||'source')+' · '+(t.bitrate||'?')+(t.fps?(' · '+t.fps+'fps'):''));
    tr.innerHTML =
      '<td><div class="name">'+t.name+'</div><div class="sub">'+(t.url||'·')+'</div></td>'+
      '<td><span class="pill '+(t.mode==='copy'?'copy':'')+'">'+t.mode+'</span></td>'+
      '<td class="sub">'+prof+'</td>'+
      '<td><span class="pill '+(active?'on':(t.enabled?'':'off'))+'">'+(active?'on air':(t.enabled?'ready':'off'))+'</span></td>'+
      '<td style="text-align:right"><button class="toggle" data-name="'+t.name+'" data-en="'+(!t.enabled)+'">'+(t.enabled?'disable':'enable')+'</button></td>';
    rows.appendChild(tr);

    // signal-flow head
    if(t.enabled){
      const h=document.createElement('div');
      h.className='head'+(active?' on':'')+(brb?' brb':'');
      h.innerHTML='<span class="hd"></span>'+t.name;
      heads.appendChild(h);
    }
  });
  if(!heads.children.length){
    heads.innerHTML='<div class="head"><span class="hd"></span>no targets enabled</div>';
  }

  rows.querySelectorAll('.toggle').forEach(b=>{
    b.onclick=async()=>{
      const name=b.dataset.name, enabled=b.dataset.en==='true';
      const r=await fetch('/api/targets/toggle'+q,{method:'POST',
        headers:{'Content-Type':'application/json',...authHeaders},
        body:JSON.stringify({name,enabled})});
      const j=await r.json();
      const t=cfg.targets.find(x=>x.name===name); if(t)t.enabled=enabled;
      renderTargets(window._snap);
      const note=document.getElementById('toggleNote');
      if(j.needs_restart){note.style.display='block';
        note.textContent=''+name+' '+(enabled?'enabled':'disabled')+'. Restart the stream (stop and re-stream from OBS) to apply.';}
    };
  });
}

function apply(snap){
  window._snap = snap;
  const phase = snap.phase;
  const tally=document.getElementById('tally'), tText=document.getElementById('tallyText');
  const core=document.getElementById('core');
  const edgeIn=document.getElementById('edgeIn'), edgeOut=document.getElementById('edgeOut');
  tally.className='tally '+(phase==='live'?'live':phase==='brb'?'brb':'idle');
  tText.textContent = phase==='live'?'on air':phase==='brb'?'be right back':phase==='starting'?'starting':phase==='stopping'?'stopping':'offline';

  const liveish=phase==='live'||phase==='brb', brb=phase==='brb';
  document.getElementById('srcLabel').textContent = phase==='live'?'OBS · live':phase==='brb'?'BRB loop':'OBS · idle';
  core.className='node core'+(phase==='live'?' on':brb?' brb':'');
  edgeIn.className='edge'+(phase==='live'?' on':brb?' brb on':'');
  edgeOut.className='edge'+(liveish?(brb?' brb on':' on'):'');

  document.getElementById('mFps').textContent = snap.output_fps?snap.output_fps.toFixed(0):'·';
  document.getElementById('mSpeed').innerHTML = (snap.output_speed?snap.output_speed.toFixed(2):'·')+'<span class="u">×</span>';
  document.getElementById('mSpeedBox').className='metric'+(snap.output_speed && snap.output_speed<0.95?' warn':'');
  document.getElementById('mDrop').textContent = snap.drop_frames||0;
  document.getElementById('mDropBox').className='metric'+(snap.drop_frames>0?' warn':'');
  document.getElementById('mUp').textContent = fmtUptime(snap.uptime_sec);
  document.getElementById('lastEvent').textContent = snap.last_event||'·';

  renderTargets(snap);
}

function connect(){
  const es=new EventSource('/api/events'+q);
  es.onmessage=e=>{ try{apply(JSON.parse(e.data));}catch(_){} };
  es.onerror=()=>{ es.close(); setTimeout(connect,2000); };
}

async function pollLogs(){
  try{
    const r=await fetch('/api/logs'+q,{headers:authHeaders});
    const j=await r.json();
    const el=document.getElementById('console');
    el.textContent=(j.lines||[]).join('\n');
    el.scrollTop=el.scrollHeight;
  }catch(_){}
  setTimeout(pollLogs,3000);
}

document.getElementById('stopBtn').onclick=async()=>{
  await fetch('/api/control/stop'+q,{method:'POST',headers:authHeaders});
};

loadConfig().then(connect);
pollLogs();
</script>
</body>
</html>
